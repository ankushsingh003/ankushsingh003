<svg width="800" height="100" viewBox="0 0 800 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 38px;
      fill: url(#paint0_linear);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .subtext {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      fill: #8BADC1;
    }
  </style>
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#0055FF"/>
    </linearGradient>
  </defs>
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="header">🚀 Recent Works</text>
  <text x="50%" y="75%" dominant-baseline="middle" text-anchor="middle" class="subtext">Automatically updated dashboard of my latest activity</text>
</svg>