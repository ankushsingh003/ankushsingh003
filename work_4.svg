<svg width="390" height="70" viewBox="0 0 390 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .marquee {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #00D9FF;
      white-space: nowrap;
    }
    .animate {
      animation: marquee 12s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-33.33%); }
    }
    .card-background {
      fill: #0D1117;
      stroke: url(#card_border_3);
      stroke-width: 2;
      rx: 12;
    }
    .glow {
      filter: blur(4px);
      opacity: 0.3;
    }
  </style>
  <defs>
    <linearGradient id="card_border_3" x1="0" y1="0" x2="390" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#0055FF"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="386" height="66" class="card-background" />
  <g class="animate">
    <text y="50%" x="20" dominant-baseline="middle" class="marquee">🟦 RAILSENTRY  •  🟦 RAILSENTRY  •  🟦 RAILSENTRY</text>
  </g>
</svg>